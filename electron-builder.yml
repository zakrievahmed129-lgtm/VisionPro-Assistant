# Aether-OS — Electron-Builder Configuration
# Multi-Target Deployment: NSIS Installer + Standalone Portable

appId: "com.visionpro.assistant"
productName: "VisionPro-Assistant"
copyright: "Copyright © 2026 Aether Solutions"

directories:
  output: "dist"
  buildResources: "build"

files:
  - "**/*"
  - "!dist/*"
  - "!out/*"
  - "!.gemini/*"
  - "!brain/*"
  - "!tmp/*"
  - "!.git/*"

# Compression & Security
asar: true
compression: "maximum"
removePackageScripts: true
nodeGypRebuild: false

# Window Metadata
win:
  target:
    - target: "portable"
      arch:
        - "x64"
  publisherName: "Aether Solutions"

# Portable (The Definitive "Magic" Edition)
portable:
  artifactName: "Aether-OS-Portable.${ext}"
  requestExecutionLevel: "user"
  unpackDirName: "aether-os-data"
